name: raisa_diary
description: Jannatul Maowa Raisa's Diary - Emotional AI-powered personal diary
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  http: ^1.2.2
  http_parser: ^4.0.2
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  fl_chart: ^0.69.2
  intl: ^0.19.0
  image_picker: ^1.1.2
  local_auth: ^2.3.0
  flutter_local_notifications: ^18.0.1
  audioplayers: ^6.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  flutter_haptic_feedback: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
