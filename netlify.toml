# Netlify — পুরো Flutter Web (repo root এ থাকতে হবে)
# UI তে Base directory খালি রাখো — শুধু এই ফাইল ব্যবহার হবে

[[plugins]]
  package = "netlify-plugin-flutter"

  [plugins.inputs]
    channel = "stable"

[build]
  base = "frontend"
  publish = "build/web"
  command = "flutter pub get && flutter build web --release --dart-define=API_BASE_URL=$API_BASE_URL"

[build.environment]
  FLUTTER_VERSION = "stable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
